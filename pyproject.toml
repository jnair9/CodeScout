[project]
name = "codescout"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "fastapi[standard]",
    "uvicorn",
    "pydantic",
    "gitpython",
    "tree-sitter",
    "tree-sitter-python"
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[tool.fastapi]
entrypoint = "backend.app.main:app"
